<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<style>
    body{
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        background-image: url('beach.jpg');
        background-repeat: no-repeat;
        background-size: cover;
    }

</style>
<body>
    <center>
    <div class="container" style="width: 400px; height: 500px; background-color: rgb(255, 255, 255); margin-top: 150px; border-radius: 20px; box-shadow: rgba(0, 0, 0, 0.15) 1.95px 1.95px 2.6px; padding: 20px;">
    
    <h1 style="padding-top: 10px; color: pink;"><b>🌸 Login 🌸</b></h1>
    
    <br>

    <form onsubmit="CheckPassword(); return false;">
      
      <div class="col">
        <label style="font-size: 20px; color: rgb(154, 185, 232);"><b>Username</b></label>
        <input type="text" id="username" class="form-control" placeholder="Input Username..." style="color: rgb(154, 170, 201);">

        <br>

        <label style="font-size: 20px; color: rgb(154, 185, 232);"><b>Password</b></label>
        <input type="password" id="password" class="form-control" placeholder="Input Password..." style="color: rgb(154, 170, 201);"> 

        <br>

        <div class="form-check mb-3">
            <input type="checkbox" class="form-check-input" id="checkbox">
            <label class="form-check-label" for="checkbox" style="margin-right: 200px; color: rgb(129, 153, 132);"><i>Remember password</i></label>
        </div>

        <br>
        <button type="submit" class="btn" style="color:rgb(255, 255, 255); background-color: rgb(117, 141, 175);"><b>Login</b></button>
        <button type="reset" class="btn" style="color:rgb(255, 255, 255); background-color: rgb(212, 212, 212);"><b>Cancel</b></button>

        <p id="correctpassword" style="color:rgb(255, 192, 213); margin-top:10px;"></p>
        <p id="wrongpassword" style="color:rgb(255, 57, 123); margin-top:10px;"></p>
    
        <h7 style="color: rgb(129, 153, 132);"><u>Forgot username / password?</u></h7>
        
    </div>

    </form>

  </div>

</center>
<script>
function CheckPassword() {
    const rightusername = "nosomei";
    const rightpassword = "2011baddie";

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let correctvalues = (username === rightusername && password === rightpassword);

    switch(correctvalues) {
        case true:
            document.getElementById("correctpassword").innerHTML = "You have logged in successfully!";
            alert("Login successful.");
            break;

        case false:
            document.getElementById("wrongpassword").innerHTML = "Invalid username or password. Try again!";
            alert("Login failed.");
            
            break;

    }
    
}
</script>

<br>
</body>
</html>
